version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: jadwal-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: jadwal_kuliah
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jadwal-net

  backend:
    build: ./backend
    container_name: jadwal-backend
    restart: always
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password
      DB_NAME: jadwal_kuliah
      PORT: 3000
    depends_on:
      - db
    networks:
      - jadwal-net

  frontend:
    build: ./frontend
    container_name: jadwal-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - jadwal-net

networks:
  jadwal-net:
    driver: bridge

volumes:
  db_data:
